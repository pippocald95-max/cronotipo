<style>
:root {
  --primary: #1a237e;
  --secondary: #5c6bc0;
  --success: #2e7d32;
  --bg: #f8f9fa;
  --text: #2c3e50;
  --white: #ffffff;
  --shadow: 0 10px 30px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background-color: var(--bg);
  color: var(--text);
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 600px;
  background: var(--white);
  padding: 40px;
  border-radius: 24px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.progress-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 6px;
  background: #eee;
}

.progress-bar {
  height: 100%;
  background: var(--primary);
  width: 20%;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.step {
  display: none;
}

.step.active {
  display: block;
  animation: slideIn 0.5s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.form-header {
  margin-bottom: 30px;
  text-align: center;
}

.form-header h1, .form-header h2 {
  font-weight: 600;
  margin-bottom: 10px;
}

.badge {
  background: #e8eaf6;
  color: var(--primary);
  padding: 4px 12px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
}

.field-group {
  margin-bottom: 24px;
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

label {
  display: block;
  font-weight: 600;
  margin-bottom: 8px;
  font-size: 14px;
}

input[type="text"], input[type="email"], input[type="number"], input[type="time"], select, textarea {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid #ddd;
  border-radius: 12px;
  font-size: 16px;
  outline: none;
  transition: border 0.3s;
}

input:focus, select:focus {
  border-color: var(--secondary);
}

.radio-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.radio-card {
  border: 1px solid #ddd;
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  text-align: center;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.radio-card input {
  display: none;
}

.radio-card:has(input:checked) {
  border-color: var(--primary);
  background: #f5f6ff;
  color: var(--primary);
}

.btn {
  padding: 14px 28px;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.3s;
}

.btn-primary { background: var(--primary); color: white; }
.btn-secondary { background: #eee; color: #666; }
.btn-success { background: var(--success); color: white; }

.btn:hover { transform: translateY(-2px); opacity: 0.9; }

.form-footer {
  display: flex;
  justify-content: space-between;
  margin-top: 40px;
}

#loadingOverlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(255,255,255,0.9);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  z-index: 1000;
}

.spinner {
  width: 50px; height: 50px;
  border: 4px solid #eee;
  border-top: 4px solid var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.hidden { display: none !important; }

@media (max-width: 480px) {
  .field-row { grid-template-columns: 1fr; }
  .container { padding: 24px; border-radius: 0; height: 100vh; }
}
</style>
